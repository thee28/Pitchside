services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: pitchside
      POSTGRES_PASSWORD: pitchside
      POSTGRES_DB: pitchside
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pitchside -d pitchside"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  pgdata:
