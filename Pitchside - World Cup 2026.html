document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

v>\n            <sc-for list=\"{{ teamGroupRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:8px;padding:9px 0;border-top:0.5px solid rgba(250,250,247,0.25);font-size:12px;color:#F5F5F0\">\n                <span style=\"{{ r.dotStyle }}\"><\u002Fspan>\n                <span style=\"font-size:15px;line-height:1\">{{ r.flag }}<\u002Fspan>\n                <span style=\"font-weight:500\">{{ r.name }}<\u002Fspan>\n                <span style=\"flex:1\"><\u002Fspan>\n                <span style=\"font-family:'DM Mono',monospace;color:rgba(250,250,247,0.62)\">{{ r.gd }} GD<\u002Fspan>\n                <span style=\"font-family:'DM Mono',monospace;font-weight:500;color:#FAFAF7;white-space:nowrap;min-width:38px;text-align:right\">{{ r.pts }} pts<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <div style=\"margin-top:16px\">\n              <div style=\"font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(250,250,247,0.62);margin-bottom:10px\">Tournament metrics<\u002Fdiv>\n              <sc-for list=\"{{ teamBars }}\" as=\"b\" hint-placeholder-count=\"3\">\n                <div style=\"margin-bottom:10px\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px\">\n                    <span style=\"color:#F5F5F0\">{{ b.label }}<\u002Fspan>\n                    <span style=\"font-family:'DM Mono',monospace;font-size:12px;color:rgba(250,250,247,0.62)\">{{ b.val }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:5px;background:rgba(250,250,247,0.18)\">\n                    <div style=\"{{ b.fillStyle }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:20px;background:#4A6741;border:1.5px solid rgba(250,250,2 A6741;border:1.5px solid rgba(250,250,247,0.55);padding:18px 20px;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:border-color 150ms\" style-hover=\"border-color:#FAFAF7\">\n                <div style=\"display:flex;align-items:center;gap:12px\">\n                  <span style=\"width:42px;height:42px;border-radius:50%;background:rgba(250,250,247,0.18);color:#F5F5F0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">{{ p.initials }}<\u002Fspan>\n                  <span>\n                    <span style=\"display:block;font-size:14px;font-weight:500;color:#FAFAF7\">{{ p.name }}<\u002Fspan>\n                    <span style=\"display:block;font-size:11px;color:rgba(250,250,247,0.62);margin-top:1px\">{{ p.pos }}<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:22px;margin-top:14px\">\n                  <span><span style=\"display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#F5F5F0\">{{ p.goals }}<\u002Fspan><span style=\"display:block;font-size:10px;letter-spacing:0.06em;color:rgba(250,250,247,0.62);margin-top:3px\">GOALS<\u002Fspan><\u002Fspan>\n                  <span><span style=\"display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#F5F5F0\">{{ p.assists }}<\u002Fspan><span style=\"display:block;font-size:10px;letter-spacing:0.06em;color:rgba(250,250,247,0.62);margin-top:3px\">ASSISTS<\u002Fspan><\u002Fspan>\n                  <span><span style=\"display:block;font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:#F5F5F0\">{{ p.rating }}<\u002Fspan><span style=\"display:block;font-size:10px;letter-spacing:0.06em;color:rgba(250,250,247,0.62);margin-top:3px\">RATING<\u002Fspan><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PLAYER ============ -->\n  <sc-if value=\"{{ isPlayer }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Player page\" style=\"position:relative;max-width:1160px;margin:0 auto;padding:24px 24px 56px\">\n      <button onclick=\"{{ playerBack }}\" style=\"background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(250,250,247,0.62)\">← {{ playerBackLabel }}<\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:16px\">\n        <span style=\"width:64px;height:64px;border-radius:50%;background:rgba(250,250,247,0.18);color:#F5F5F0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700\">{{ player.initials }}<\u002Fspan>\n        <div>\n          <div style=\"font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,40px);line-height:1;letter-spacing:0.03em;color:#FAFAF7\">{{ player.name }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(250,250,247,0.62);margin-top:5px\">\n            <span style=\"font-size:15px;line-height:1\">{{ player.flag }}<\u002Fspan>\n            <span>{{ player.teamName }}<\u002Fspan>\n            <span>·<\u002Fspan>\n            <span>{{ player.pos }}<\u002Fspan>\n            <span>·<\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace\">#{{ player.num }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ playerNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px;display:inline-block;background:#FAFAF7;border:1.5px solid #4A6741;color:#2E4228;font-size:11px;font-weight:700;letter-spacing:0.06em;padding:5px 10px\">{{ playerNote }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:16px;margin-top:20px\">\n        <sc-for list=\"{{ playerTiles }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"background:#4A6741;border:1.5px solid rgba(250,250,247,0.55);padding:16px 20px\">\n            <div style=\"font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:#F5F5F0\">{{ t.value }}<\u002Fdiv>\n            <div style=\"font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(250,250,247,0.62);margin-top:6px\">{{ t.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;flex-wrap:wrap;margin-top:20px;align-items:stretch\">\n        <div style=\"flex:1 1 340px;min-width:300px;background:#4A6741;border:1.5px solid rgba(250,250,247,0.55);padding:20px 22px\">\n          <div style=\"font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(250,250,247,0.62);margin-bottom:14px\">Performance<\u002Fdiv>\n          <sc-for list=\"{{ playerBars }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <div style=\"margin-bottom:12px\">\n              <div style=\"display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px\">\n                <span style=\"color:#F5F5F0\">{{ b.label }}<\u002Fspan>\n                <span style=\"font-family:'DM Mono',monospace;font-size:12px;color:rgba(250,250,247,0.62)\">{{ b.val }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:5px;background:rgba(250,250,247,0.18)\">\n                <div style=\"{{ b.fillStyle }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 340px;min-width:300px;background:#4A6741;border:1.5px solid rgba(250,250,247,0.55);padding:20px 22px\">\n          <div style=\"font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(250,250,247,0.62);margin-bottom:14px\">Tournament form · match ratings<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:18px;height:130px;padding:0 6px\">\n            <sc-for list=\"{{ playerForm }}\" as=\"f\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end\">\n                <span style=\"font-family:'DM Mono',monospace;font-size:11px;color:rgba(250,250,247,0.62)\">{{ f.r }}<\u002Fspan>\n                <div style=\"{{ f.barStyle }}\"><\u002Fdiv>\n                <span style=\"font-size:10px;font-weight:500;letter-spacing:0.04em;color:rgba(250,250,247,0.62)\">{{ f.opp }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ BRACKET ============ -->\n  <sc-if value=\"{{ isBracket }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Knockout bracket\" style=\"position:relative;max-width:1160px;margin:0 auto;padding:28px 24px 56px\">\n      <div style=\"font-size:20px;font-weight:500;color:#FAFAF7\">Knockout bracket<\u002Fdiv>\n      <div style=\"font-size:13px;color:rgba(250,250,247,0.62);margin:4px 0 20px\">Every knockout result, from the Round of 32 to France’s title in East Rutherford on July 19.<\u002Fdiv>\n      <div style=\"overflow-x:auto;padding-bottom:12px\">\n        <div style=\"display:flex;gap:22px;min-width:1080px\">\n          <sc-for list=\"{{ bracketCols }}\" as=\"col\" hint-placeholder-count=\"5\">\n            <div style=\"flex:1 1 0;display:flex;flex-direction:column\">\n              <div style=\"font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:rgba(250,250,247,0.62)\">{{ col.title }}<\u002Fdiv>\n              <div style=\"font-size:10px;color:rgba(250,250,247,0.6);margin:2px 0 12px\">{{ col.sub }}<\u002Fdiv>\n              <div style=\"flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:8px;min-height:1150px\">\n                <sc-for list=\"{{ col.matches }}\" as=\"m\" hint-placeholder-count=\"4\">\n                  <div style=\"{{ m.cardStyle }}\">\n                    <div style=\"display:flex;align-items:center;gap:7px;padding:2px 0\">\n                      <span style=\"font-size:14px;line-height:1\">{{ m.fa }}<\u002Fspan>\n                      <span style=\"{{ m.aStyle }}\">{{ m.ca }}<\u002Fspan>\n                      <span style=\"flex:1\"><\u002Fspan>\n                      <span style=\"{{ m.asStyle }}\">{{ m.sa }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:7px;padding:2px 0\">\n                      <span style=\"font-size:14px;line-height:1\">{{ m.fb }}<\u002Fspan>\n                      <span style=\"{{ m.bStyle }}\">{{ m.cb }}<\u002Fspan>\n                      <span style=\"flex:1\"><\u002Fspan>\n                      <span style=\"{{ m.bsStyle }}\">{{ m.sb }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:4px\">\n                      <span style=\"{{ m.noteStyle }}\">{{ m.note }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ LEADERS ============ -->\n  <sc-if value=\"{{ isLeaders }}\" hint-placeholder-val=\"{{ false }}\">\n    <div data-screen-label=\"Stats leaders\" style=\"position:relative;max-width:1160px;margin:0 auto;padding:28px 24px 56px\">\n      <div style=\"font-size:20px;font-weight:500;color:#FAFAF7\">Golden Boot (Top scorer)<\u002Fdiv>\n      <div style=\"font-size:13px;color:rgba(250,250,247,0.62);margin:4px 0 20px\">104 matches played. Mbappé’s nine goals take the boot.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:16px;margin-bottom:20px\">\n        <sc-for list=\"{{ topThree }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ p.open }}\" style=\"{{ p.style }}\" style-hover=\"{{ p.hoverStyle }}\">\n            <span style=\"font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:rgba(250,250,247,0.6)\">{{ p.rank }}<\u002Fspan>\n            <span style=\"width:42px;height:42px;border-radius:50%;background:rgba(250,250,247,0.18);color:#F5F5F0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">{{ p.initials }}<\u002Fspan>\n            <span style=\"flex:1\">\n              <span style=\"display:block;font-size:14px;font-weight:500;color:#FAFAF7\">{{ p.name }}<\u002Fspan>\n              <span style=\"display:block;font-size:11px;color:rgba(250,250,247,0.62);margin-top:1px\">{{ p.flag }} {{ p.teamName }}<\u002Fspan>\n            <\u002Fspan>\n            <span style=\"text-align:right\">\n              <span style=\"display:block;font-family:'Bebas Neue',sans-serif;font-size:36px;line-height:1;color:#F5F5F0\">{{ p.goals }}<\u002Fspan>\n              <span style=\"display:block;font-size:10px;letter-spacing:0.06em;color:rgba(250,250,247,0.62)\">GOALS<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;flex-wrap:wrap;align-items:stretch\">\n        <div style=\"flex:2 1 460px;min-width:320px;background:#4A6741;border:1.5px solid rgba(250,250,247,0.55);padding:8px 22px 16px\">\n          <div style=\"display:grid;grid-template-columns:28px 1fr repeat(3, minmax(40px, 56px));gap:0 8px;align-items:center;padding:10px 0 6px\">\n            <div style=\"font-size:10px;font-weight:500;color:rgba(250,250,247,0.62)\">#<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:500;letter-spacing:0.06em;color:rgba(250,250,247,0.62)\">PLAYER<\u002Fdiv>\n            <div style=\"font-size:10px;font-weight:500;color:rgba(       const axesNames = ['Possession', 'Pressing', 'Directness', 'Width', 'Creation', 'Defending'];\n      const cx = 120, cy = 120;\n      Object.assign(teamVals, {\n        team,\n        radarRing1: this.radarPts([33,33,33,33,33,33]),\n        radarRing2: this.radarPts([66,66,66,66,66,66]),\n        radarRing3: this.radarPts([100,100,100,100,100,100]),\n        radarData: this.radarPts(team.radar),\n        radarAxes: axesNames.map((n, i) => {\n          const a = (-90 + i * 60) * Math.PI / 180;\n          return { x: (cx + 86 * Math.cos(a)).toFixed(1), y: (cy + 86 * Math.sin(a)).toFixed(1) };\n        }),\n        radarLabels: axesNames.map((n, i) => {\n          const a = (-90 + i * 60) * Math.PI / 180;\n          const x = cx + 103 * Math.cos(a), y = cy + 103 * Math.sin(a);\n          return { x: x.toFixed(1), y: (y + 3).toFixed(1), t: n, anchor: Math.abs(Math.cos(a)) < 0.3 ? 'middle' : (Math.cos(a) > 0 ? 'start' : 'end') };\n        }),\n        teamGroupRows: this.rowsFor(team.group),\n        teamBars: team.bars.map(b => ({ label: b[0], val: b[1], fillStyle: fillStyle(b[2], b[0].indexOf('conceded') >= 0) })),\n        teamMatches: team.matches.map(m => ({\n          stage: m[0], opp: m[1], flag: m[2], score: m[3], res: m[4], note: m[5], chipStyle: chipStyle(m[4])\n        })),\n        teamPlayers: team.players.map(pid => {\n          const p = this.players[pid];\n          return {\n            name: p.name, pos: p.pos, goals: p.goals, assists: p.assists, rating: p.rating,\n            initials: this.initials(p.name),\n            open: () => this.setState({ page: 'player', playerId: pid })\n          };\n        })\n      });\n    }\n\n    // player page\n    const player = s.playerId ? this.players[s.playerId] : null;\n    let playerVals = {};\n    if (player) {\n      playerVals = {\n        player: Object.assign({ initials: this.initials(player.name) }, player),\n        playerNote: player.note || false,\n        playerBack: () => player.teamId\n          ? this.setState({ page: 'team', teamId: player.teamId, playerId: null })\n          : this.nav('leaders'),\n        playerBackLabel: player.teamId ? this.teams[player.teamId].name.charAt(0) + this.teams[player.teamId].name.slice(1).toLowerCase() : 'Leaders',\n        playerTiles: [\n          { value: player.goals, label: 'Goals' },\n          { value: player.assists, label: 'Assists' },\n          { value: player.rating, label: 'Avg rating' },\n          { value: player.mins + '′', label: 'Minutes' }\n        ],\n        playerBars: player.bars.map(b => ({ label: b[0], val: b[1], fillStyle: fillStyle(b[2], b[2] < 50) })),\n        playerForm: player.form.map(f => ({\n          opp: f[0], r: f[1].toFixed(1),\n          barStyle: { width: 26, height: Math.round(f[1] / 10 * 84), background: f[1] >= 7.5 ? '#F5F5F0' : '#F8A828', transformOrigin: 'bottom', animation: 'psBar 600ms ease-out' }\n        }))\n      };\n    }\n\n    // bracket\n    const cardKinds = {\n      def: {\n        card: { background: '#4A6741', border: '1.5px solid rgba(250,250,247,0.55)', padding: '10px 12px' },\n        win: '#FAFAF7', lose: 'rgba(250,250,247,0.6)', winScore: '#FAFAF7', loseScore: 'rgba(250,250,247,0.45)',\n        note: 'rgba(250,250,247,0.55)', noteWeight: 500\n      },\n      champ: {\n        card: { background: '#F8A828', border: '1.5px solid #FAFAF7', padding: '10px 12px' },\n        win: '#FAFAF7', lose: 'rgba(250,250,247,0.78)', winScore: '#FAFAF7', loseScore: 'rgba(250,250,247,0.7)',\n        note: '#FAFAF7', noteWeight: 700\n      },\n      third: {\n        card: { background: '#FAFAF7', border: '1.5px solid #4A6741', padding: '10px 12px' },\n        win: '#2E4228', lose: 'rgba(46,66,40,0.55)', winScore: '#2E4228', loseScore: 'rgba(46,66,40,0.5)',\n        note: '#4A6741', noteWeight: 700\n      }\n    };\n    const mk = m => {\n      const [ca, sa, cb, sb, w, note, kind] = m;\n      const k = cardKinds[kind] || cardKinds.def;\n      const teamStyle = win => ({ fontSize: 12, fontWeight: win ? 700 : 500, color: win ? k.win : k.lose });\n      const scoreStyle = win => ({ fontFamily: \"'Bebas Neue',sans-serif\", fontSize: 17, lineHeight: 1, color: win ? k.winScore : k.loseScore });\n      return {\n        fa: this.flags[ca], fb: this.flags[cb], ca, cb, sa, sb,\n        aStyle: teamStyle(w === 'a'), bStyle: teamStyle(w === 'b'),\n        asStyle: scoreStyle(w === 'a'), bsStyle: scoreStyle(w === 'b'),\n        note, noteStyle: { fontSize: 9.5, fontWeight: k.noteWeight, letterSpacing: '0.05em', color: k.note },\n        cardStyle: k.card\n      };\n    };\n    const bracketCols = [\n      { title: 'Round of 32', sub: 'Jun 28 – Jul 3', matches: this.r32.map(mk) },\n      { title: 'Round of 16', sub: 'Jul 4 – 7', matches: this.r16.map(mk) },\n      { title: 'Quarter-finals', sub: 'Jul 9 – 11', matches: this.qf.map(mk) },\n      { title: 'Semi-finals', sub: 'Jul 14 – 15', matches: this.sf.map(mk) },\n      { title: 'Final · Third place', sub: 'Jul 18 – 19 · East Rutherford', matches: this.fin.map(mk) }\n    ];\n\n    // leaders\n    const openPlayer = pid => () => this.setState({ page: 'player', playerId: pid });\n    const board = this.boardIds.map((pid, i) => Object.assign({ pid, rank: i + 1 }, this.players[pid]));\n    const medals = ['#F8A828', '#A9AFA6', '#BC8A62'];\n    const topThree = board.slice(0, 3).map((p, i) => ({\n      rank: p.rank, name: p.name, flag: p.flag, teamName: p.teamName, goals: p.goals,\n      initials: this.initials(p.name), open: openPlayer(p.pid),\n      style: {\n        background: medals[i], border: '1.5px solid rgba(250,250,247,0.7)', padding: '18px 20px',\n        cursor: 'pointer', textAlign: 'left', fontFamily: \"'DM Sans',sans-serif\",\n        display: 'flex', alignItems: 'center', gap: 14, transition: 'border-color 150ms'\n      },\n      hoverStyle: { borderColor: '#FAFAF7' }\n    }));\n    const rowStyle = {\n      display: 'grid', gridTemplateColumns: '28px 1fr repeat(3, minmax(40px, 56px))', gap: '0 8px',\n      alignItems: 'center', width: '100%', background: 'none', border: 'none', borderTop: '0.5px solid rgba(250,250,247,0.25)',\n      padding: '9px 0', cursor: 'pointer', textAlign: 'left', fontFamily: \"'DM Sans',sans-serif\", transition: 'background 150ms'\n    };\n    const boardRows = board.map(p => ({\n      rank: p.rank, flag: p.flag, name: p.name, teamCode: p.teamName,\n      goals: p.goals, assists: p.assists, mins: p.mins + '′',\n      open: openPlayer(p.pid), style: rowStyle, hoverStyle: { background: 'rgba(250,250,247,0.12)' }\n    }));\n    const assistRows = [['olise', 7], ['messi', 6], ['vinicius', 4]].map(([pid, n]) => ({\n      flag: this.players[pid].flag, name: this.players[pid].name, n\n    }));\n    const awards = [\n      { flag: '🇫🇷', name: 'Kylian Mbappé', award: 'Golden Boot', detail: '9 goals' },\n      { flag: '🇦🇷', name: 'Lionel Messi', award: 'Golden Ball', detail: '5 G · 6 A' },\n      { flag: '🇫🇷', name: 'Mike Maignan', award: 'Golden Glove', detail: '4 clean sheets' }\n    ];\n\n    return Object.assign({\n      isHome: s.page === 'home', isTeams: s.page === 'teams', isTeam: s.page === 'team' && !!team,\n      isPlayer: s.page === 'player' && !!player, isBracket: s.page === 'bracket', isLeaders: s.page === 'leaders',\n      heroFloodlit: variant === 'floodlit', heroBroadcast: variant === 'broadcast', heroTicker: variant === 'ticker',\n      showHeroStats: this.props.showHeroStats ?? true,\n      navLinks, groupTabs,\n      standingsRows: this.rowsFor(s.group),\n      koResults, knockoutRuns, tourStats, teamCards, bracketCols, topThree, boardRows, assistRows, awards,\n      goHome: () => this.nav('home'),\n      goTeams: () => this.nav('teams'),\n      goBracket: () => this.nav('bracket'),\n      goLeaders: () => this.nav('leaders'),\n      goChampions: () => this.setState({ page: 'team', teamId: 'fra', playerId: null }),\n      goRunnersUp: () => this.setState({ page: 'team', teamId: 'arg', playerId: null })\n    }, teamVals, playerVals);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
